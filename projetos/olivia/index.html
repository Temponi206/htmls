<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loml</title>
  <link rel="icon" type="image/jpeg" href="snoppey.jpg" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fff0f5, #ffe4ec, #fff7fa);
      color: #5b2b38;
      overflow: hidden;
      position: relative;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -40px;
      opacity: 0.25;
      animation: subir linear forwards;
    }

    @keyframes subir {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }

      20% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(-110vh) scale(1.4);
        opacity: 0;
      }
    }

    .intro {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 700px;
      text-align: center;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      padding: 40px 28px;
      box-shadow: 0 18px 45px rgba(124, 45, 74, 0.14);
    }

    .mini-heart {
      display: inline-block;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .card h1 {
      font-size: clamp(2.3rem, 6vw, 4rem);
      color: #c44569;
      margin-bottom: 12px;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.85);
    }

    .subtitle {
      font-size: clamp(1.1rem, 2.3vw, 1.4rem);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .text {
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.8;
      font-size: 1.05rem;
      color: #6b3344;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #c44569;
      color: white;
      box-shadow: 0 12px 24px rgba(196, 69, 105, 0.22);
    }

    .btn-primary:hover {
      box-shadow: 0 18px 30px rgba(196, 69, 105, 0.28);
    }

    .btn-secondary {
      background: white;
      color: #b3395a;
      border: 1px solid rgba(179, 57, 90, 0.16);
      box-shadow: 0 10px 20px rgba(124, 45, 74, 0.08);
    }

    .hint {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #8a5062;
    }

    @media (max-width: 600px) {
      body {
        overflow-y: auto;
      }

      .card {
        padding: 32px 20px;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
    
  <div class="hearts" id="hearts"></div>

  <audio id="musica" autoplay loop playsinline style="display: none;">
    <source src="daniel.mp3" type="audio/mpeg" />
    Seu navegador não suporta áudio.
  </audio>

  <main class="intro">
    <section class="card">
      <span class="mini-heart">❤️</span>

      <h1>Oi, Olivia</h1>

      <p class="text">
        É uma cartinha pra vc meu bem
      </p>

      <div class="buttons">
        <button id="btnEntrar" class="btn btn-primary">
          Abrir seu presente
        </button>

        <button id="btnMusica" class="btn btn-secondary">
          Tocar música
        </button>
      </div>

      <p class="hint">
        Abre com calma e com som
      </p>
    </section>
  </main>

  <script>
    const heartsContainer = document.getElementById("hearts");
    const btnEntrar = document.getElementById("btnEntrar");
    const btnMusica = document.getElementById("btnMusica");
    const musica = document.getElementById("musica");

    const paginaPrincipal = "bom.html"; // troca aqui se o nome estiver diferente

    const simbolos = ["❤", "💖", "💕", "💗", "💘"];

    function criarCoracao() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.textContent = simbolos[Math.floor(Math.random() * simbolos.length)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = 14 + Math.random() * 26 + "px";
      heart.style.animationDuration = 8 + Math.random() * 6 + "s";

      heartsContainer.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 14000);
    }

    setInterval(criarCoracao, 450);

    window.addEventListener("load", async () => {
      try {
        await musica.play();
        btnMusica.textContent = "Música tocando 💖";
      } catch (erro) {
        btnMusica.textContent = "Tocar música";
      }
    });

    btnMusica.addEventListener("click", async () => {
      try {
        await musica.play();
        btnMusica.textContent = "Música tocando 💖";
      } catch (erro) {
        console.log("O navegador bloqueou o áudio.");
      }
    });

    btnEntrar.addEventListener("click", async () => {
      try {
        await musica.play();
      } catch (erro) {}

      window.location.href = paginaPrincipal;
    });
  </script>
</body>
</html>
